name: Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: wimpysworld/nothing-but-nix@main
      with:
        hatchet-protocol: 'rampage'
    - uses: DeterminateSystems/nix-installer-action@main
      with:
        determinate: true
        extra-conf: "lazy-trees = true"
    - uses: cachix/cachix-action@v16
      with:
        name: digitallyinduced
        skipPush: true

    # Uncomment and set your cachix cache name
    # - uses: cachix/cachix-action@v16
    #   with:
    #     name: CHANGE-ME
    #     skipPush: true
    - uses: DeterminateSystems/magic-nix-cache-action@main
    - run: nix flake check --impure --print-build-logs

    # Uncomment to push to cachix after successful tests
    # Requires apps.push-cachix to be uncommented in flake.nix
    # - name: Push to Cachix
    #   if: github.ref == 'refs/heads/main'
    #   env:
    #     CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    #   run: nix run .#push-cachix --impure
